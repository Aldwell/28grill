<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>28 GRILL</title>
  <meta name="description" content="28 GRILL — smash burgers в Капана, Пловдив.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" href="./assets/images/logo.png" type="image/png">
  <link rel="preload" as="image" href="./assets/images/background_main.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body data-page="index">
  <header class="navbar">
    <div class="nav-container navbar-inner">
      <a class="nav-logo" href="index.html" aria-label="28 GRILL home">
        <img src="./assets/images/logo.png" alt="28 GRILL logo" width="150" height="74">
      </a>
      <nav class="nav-menu" data-nav-menu aria-label="Main navigation">
        <a href="index.html" class="active" data-i18n="nav.home"></a>
        <a href="menu.html" data-i18n="nav.menu"></a>
        <a href="order.html" data-i18n="nav.order"></a>
        <a href="contact.html" data-i18n="nav.contact"></a>
      </nav>
      <div class="nav-actions">
        <div class="language-switcher" data-language-switcher></div>
        <button class="nav-toggle" type="button" data-nav-toggle data-i18n-aria="nav.toggle" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="hero hero--collage">
      <img class="hero-bg-image" src="./assets/images/background_main.png" alt="" aria-hidden="true">
      <canvas id="heroCanvas" class="hero-sparks" aria-hidden="true"></canvas>
      <div class="container hero-grid">
        <div class="hero-copy">
          <p class="eyebrow" data-i18n="home.eyebrow"></p>
          <h1 class="hero-title"><span data-i18n="home.h1a"></span><small data-i18n="home.h1b"></small></h1>
          <p class="hero-intro hero-subtitle" data-i18n="home.intro"></p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="menu.html" data-i18n="common.viewMenu"></a>
            <a class="btn btn-ghost" href="order.html" data-i18n="common.orderNow"></a>
          </div>
          <ul class="hero-proof" aria-label="28 GRILL rating">
            <li><strong>4.9</strong><span data-i18n="common.rating"></span></li>
            <li><strong>284</strong><span data-i18n="common.reviews"></span></li>
            <li><strong>10</strong><span data-i18n="common.location"></span></li>
          </ul>
        </div>
      </div>
    </section>

    <section class="section kapana-art-section" aria-labelledby="kapana-art-title">
      <div class="container kapana-art-grid">
        <div class="kapana-art-copy">
          <p class="eyebrow" data-i18n="home.kapanaEyebrow"></p>
          <h2 id="kapana-art-title" data-i18n="home.kapanaTitle"></h2>
          <p class="kapana-art-text" data-i18n="home.kapanaText"></p>
          <p class="kapana-art-text" data-i18n="home.kapanaText2"></p>
        </div>
        <div class="kapana-art-media" aria-hidden="true">
          <figure class="kapana-art-img kapana-art-img--primary">
            <img src="./assets/images/kapana.jpg" alt="" loading="lazy" decoding="async" width="900" height="1100">
          </figure>
          <figure class="kapana-art-img kapana-art-img--accent">
            <img src="./assets/images/artburger.png" alt="" loading="lazy" decoding="async" width="900" height="900">
          </figure>
        </div>
      </div>
    </section>

    <section class="section story-band">
      <div class="container story-grid">
        <div>
          <p class="eyebrow">28 GRILL</p>
          <h2 data-i18n="home.storyTitle"></h2>
        </div>
        <div>
          <p data-i18n="home.storyText"></p>
          <div class="proof-grid">
            <article>
              <span>01</span>
              <h3 data-i18n="home.proofFresh"></h3>
              <p data-i18n="home.proofFreshText"></p>
            </article>
            <article>
              <span>02</span>
              <h3 data-i18n="home.proofSmash"></h3>
              <p data-i18n="home.proofSmashText"></p>
            </article>
            <article>
              <span>03</span>
              <h3 data-i18n="home.proofSauce"></h3>
              <p data-i18n="home.proofSauceText"></p>
            </article>
          </div>
        </div>
      </div>
    </section>

    <section class="section order-strip">
      <div class="container order-strip-inner">
        <div>
          <p class="eyebrow" data-i18n="order.platforms"></p>
          <h2 data-i18n="common.orderNow"></h2>
        </div>
        <div class="platform-row">
          <a class="platform-link wolt" href="https://wolt.com/bg/bgr/plovdiv/restaurant/28-grill" target="_blank" rel="noopener" aria-label="Wolt">
            <img class="platform-link-logo" src="./assets/images/wolt.webp" alt="Wolt" width="72" height="72" loading="lazy" decoding="async">
          </a>
          <a class="platform-link takeaway" href="https://www.takeaway.com/bg/menu/28-grill28-gril" target="_blank" rel="noopener" aria-label="Takeaway">
            <img class="platform-link-logo" src="./assets/images/takeaway.png" alt="Takeaway" width="72" height="72" loading="lazy" decoding="async">
          </a>
          <a class="platform-link bolt" href="https://food.bolt.eu/bg-bg/2128-plovdiv/p/191640-28-grill/" target="_blank" rel="noopener" aria-label="Bolt Food">
            <img class="platform-link-logo" src="./assets/images/boldlogo.png" alt="Bolt Food" width="72" height="72" loading="lazy" decoding="async">
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-grid">
      <div>
        <img src="./assets/images/logo.png" alt="28 GRILL logo" width="120" height="59">
        <p data-i18n="common.brandLine"></p>
      </div>
      <nav aria-label="Footer navigation">
        <a href="index.html" data-i18n="nav.home"></a>
        <a href="menu.html" data-i18n="nav.menu"></a>
        <a href="order.html" data-i18n="nav.order"></a>
        <a href="contact.html" data-i18n="nav.contact"></a>
      </nav>
      <div>
        <p data-i18n="common.footerContact"></p>
        <p><a href="tel:+359888395779">088 839 5779</a></p>
        <p data-i18n="common.footerHours"></p>
      </div>
    </div>
    <div class="footer-bottom">© <span data-year></span> <span data-i18n="common.allRights"></span></div>
  </footer>

  <script src="./js/translations.js"></script>
  <script src="./js/menu-data.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
