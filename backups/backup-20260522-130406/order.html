<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>28 GRILL</title>
  <meta name="description" content="28 GRILL — smash burgers в Капана, Пловдив.">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="icon" href="./assets/images/logo.png" type="image/png">

<body data-page="order">
  <header class="navbar">

      <a class="nav-logo" href="index.html" aria-label="28 GRILL home">

      <div class="container">
        <div class="section-heading center">
          <p class="eyebrow" data-i18n="order.platforms"></p>
          <h2 data-i18n="common.orderNow"></h2>
        </div>
        <div class="order-platform-grid">
          <a class="order-platform-card platform-card wolt" href="https://wolt.com/bg/bgr/plovdiv/restaurant/28-grill" target="_blank" rel="noopener" aria-label="Wolt">
            <span class="platform-card-media" aria-hidden="true"></span>
            <img class="platform-card-logo" src="./assets/images/wolt.webp" alt="Wolt" loading="lazy" decoding="async">
          </a>
          <a class="order-platform-card platform-card takeaway" href="https://www.takeaway.com/bg/menu/28-grill28-gril" target="_blank" rel="noopener" aria-label="Takeaway">

            <img class="platform-card-logo" src="./assets/images/takeaway-ui.webp" alt="Takeaway" loading="lazy" decoding="async">

            <span class="platform-card-media" aria-hidden="true"></span>
            <img class="platform-card-logo" src="./assets/images/boldlogo.webp" alt="Bolt Food" loading="lazy" decoding="async">
          </a>
        </div>
        <p class="order-platform-note" data-i18n="order.platformDisclaimer"></p>
      </div>
    </section>

    <section class="section visit-section">
      <div class="container visit-card">
        <div>
          <p class="eyebrow" data-i18n="common.location"></p>
          <h2 data-i18n="order.visitTitle"></h2>
          <p data-i18n="order.visitText"></p>
        </div>
        <a class="btn btn-primary" href="contact.html" data-i18n="nav.contact"></a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-grid">
      <div>
        <a class="footer-logo-link" href="index.html" aria-label="28 GRILL home">
          <img src="./assets/images/logo-ui.png" alt="28 GRILL logo" width="120" height="59" loading="lazy" decoding="async">

        <p data-i18n="common.brandLine"></p>
      </div>
      <nav aria-label="Footer navigation">
        <a href="index.html" data-i18n="nav.home"></a>
